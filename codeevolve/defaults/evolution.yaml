# CodeEvolution default configuration
# All fields have sensible defaults for Rust + llama.cpp on RTX 4060 (8GB VRAM)

# Provider: "local" for llama-server, "codex" for OpenAI Codex CLI, "claude" for Claude Code CLI
provider: "codex"

# Glob patterns controlling which Rust source files are included in evolution
include_globs:
  - "src/**/*.rs"
exclude_globs: []

codex:
  cli_path: "codex"
  model: "gpt-5.4-mini"
  proxy_port: 8081
  timeout: 300

claude:
  cli_path: "claude"
  model: "haiku"
  effort: "low"
  proxy_port: 8082
  timeout: 300

llama_server:
  server_path: "D:/Ollama/whiscortex-training/llama.cpp/build/bin/Release/llama-server.exe"
  model_path: "D:/Ollama/llama.cpp models/qwen2.5-coder-14b-instruct-abliterated-q4_k_m.gguf"
  port: 8080
  gpu_layers: 30
  context_size: 8192
  threads: 8
  cache_type_k: "q8_0"
  cache_type_v: "q8_0"
  flash_attn: true

evolution:
  max_iterations: 500
  population_size: 100
  num_islands: 5
  migration_interval: 20
  diff_based_evolution: true
  max_fix_attempts: 4

rust:
  cargo_path: "cargo"
  target_dir: null
  test_args: []
  clippy_args: []

fitness:
  static_analysis_weight: 0.35
  performance_weight: 0.35
  llm_judgment_weight: 0.30
  clippy_weights:
    correctness: 5
    suspicious: 3
    complexity: 2
    perf: 2
    style: 1

benchmarks:
  measure_compile_time: true
  measure_binary_size: true
  custom_command: "cargo bench"
  custom_command_score_regex: null
  binary_package: null
  upx_path: null
  upx_args:
    - "--best"
    - "--force"

llm_judgment:
  enabled: false
  top_quartile_only: false
  num_runs: 3
  dimensions:
    - readability
    - rust_idiomaticity
    - maintainability
    - design
    - elegance
    - clean code
