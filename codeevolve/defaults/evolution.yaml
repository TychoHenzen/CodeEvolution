# CodeEvolution default configuration
# All fields have sensible defaults for Rust + llama.cpp on RTX 4060 (8GB VRAM)

# Provider: "local", "codex", "claude", or "mixed" (randomly alternates codex + claude)
provider: "codex"

# Glob patterns controlling which Rust source files are included in evolution
include_globs:
  - "src/**/*.rs"
exclude_globs: []

codex:
  cli_path: "codex"
  model: "gpt-5.4-mini"
  proxy_port: 8081
  timeout: 300

claude:
  cli_path: "claude"
  model: "haiku"
  effort: "low"
  proxy_port: 8082
  timeout: 300

llama_server:
  server_path: "llama-server"
  model_path: "model.gguf"  # absolute path to your GGUF model file
  port: 8080
  gpu_layers: 30
  context_size: 8192
  threads: 8
  cache_type_k: "q8_0"
  cache_type_v: "q8_0"
  flash_attn: true

evolution:
  max_iterations: 500
  population_size: 100
  num_islands: 5
  migration_interval: 20
  diff_based_evolution: true
  max_fix_attempts: 4
  max_gate_retries: 2   # regeneration retries when candidate fails all gates
  checkpoint_interval: 10
  tech_debt_ledger: ""
  top_n_files: 20
  prod_only: true
  changes_description: false  # enable meta-prompting (co-evolves code descriptions, requires diff mode)
  exploration_ratio: 0.2      # probability of random parent selection (exploration)
  exploitation_ratio: 0.7     # probability of elite parent selection (exploitation)
  temperature: 0.7            # LLM sampling temperature
  claude_weight: 0.7          # weight for claude model in mixed mode (codex gets 1 - this)
  shuffle_schedule: true      # randomize file visit order (weighted by score/length) to avoid restart bias
  merge_top_k: 5              # after each slot, merge non-conflicting improvements from top K candidates

rust:
  cargo_path: "cargo"
  target_dir: null
  jobs: 4  # limit parallel cargo jobs (-j N), null = cargo default (num CPUs)
  test_args: []
  clippy_args: []

fitness:
  performance_weight: 0.50
  llm_judgment_weight: 0.50

benchmarks:
  measure_compile_time: true
  measure_binary_size: true
  measure_loc: true
  custom_command: null  # set to e.g. "cargo bench" with a score_regex to enable
  custom_command_score_regex: null
  binary_package: null
  upx_path: null
  upx_args:
    - "--best"
    - "--force"

# Model tiers for escalating quality/cost on evaluator tasks.
# Low tier (provider default) handles generation + LLM judging + first N-2 fixer attempts.
# Mid tier handles the last 2 fixer attempts.
tiers:
  mid_codex: "gpt-5.3-codex"
  mid_claude: "sonnet"
  high_codex: "gpt-5.4"
  high_claude: "opus"

llm_judgment:
  enabled: true
  top_quartile_only: false
  num_runs: 1
  dimensions:
    - readability
    - rust_idiomaticity
    - maintainability
    - design
    - elegance
    - clean code
